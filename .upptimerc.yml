owner: kipfinance
repo: kip-status
user-agent: kip-status

workflowSchedule:
  uptime: "3,13,23,33,43,53 * * * *"

sites:
  - name: Login and authentication
    url: https://status.kip-ai.com/synthetic-status.json
    slug: login-authentication
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "component:login_authentication:ok"

  - name: Vault and document upload
    url: https://status.kip-ai.com/synthetic-status.json
    slug: vault-document-upload
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "component:vault_document_upload:ok"

  - name: Document processing
    url: https://status.kip-ai.com/synthetic-status.json
    slug: document-processing
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "component:document_processing:ok"

  - name: Tax engine and artifacts
    url: https://status.kip-ai.com/synthetic-status.json
    slug: tax-engine-artifacts
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "component:tax_engine_artifacts:ok"

status-website:
  cname: status.kip-ai.com
  name: Kip Status
  logoUrl: https://app.kip-ai.com/favicon.svg
  introTitle: "Kip Status"
  introMessage: "Current status and uptime history for Kip services."
  theme: light
  navbar:
    - title: Status
      href: /
    - title: Kip
      href: https://app.kip-ai.com
    - title: Support
      href: mailto:support@kip-ai.com
  links:
    - rel: stylesheet
      href: https://status.kip-ai.com/kip-status.css
  customHeadHtml: |
    <script>document.documentElement.classList.add("kip-status-enhanced");</script>
  customBodyHtml: |
    <div id="kip-status-app" class="kip-status-app" aria-live="polite">
      <div class="ks-loading">
        <div class="ks-mark" aria-hidden="true">K</div>
        <div>
          <strong>Kip status</strong>
          <span>Loading live checks...</span>
        </div>
      </div>
    </div>
    <script src="https://status.kip-ai.com/kip-status.js"></script>

i18n:
  footer: "Powered by Kip synthetic checks and Upptime."
